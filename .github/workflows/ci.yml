name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  check:
    name: Check (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (SSR)
        run: cargo clippy --features ssr --no-default-features -- -D warnings

      - name: cargo clippy (hydrate / WASM)
        run: cargo clippy --target wasm32-unknown-unknown --features hydrate --no-default-features -- -D warnings

      - name: cargo test
        run: cargo test

  e2e:
    name: E2E (Playwright — release)
    runs-on: ubuntu-latest
    needs: check

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: samete
          POSTGRES_USER: samete
          POSTGRES_PASSWORD: samete
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U samete -d samete"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://samete:samete@localhost/samete
      SAMETE_TEST_MODE: "true"
      SAMETE_SMS_DRY_RUN: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-leptos
        run: cargo binstall cargo-leptos --no-confirm

      - name: Install wasm-opt
        run: cargo binstall wasm-opt --no-confirm

      - name: Install sqlx-cli
        run: cargo binstall sqlx-cli --no-confirm --no-symlinks

      - name: Install just
        run: cargo binstall just --no-confirm

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright dependencies
        working-directory: end2end
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests (release)
        run: just e2e-release
