name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  check:
    name: Check (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (SSR)
        run: cargo clippy --features ssr --no-default-features -- -D warnings

      - name: cargo clippy (hydrate / WASM)
        run: cargo clippy --target wasm32-unknown-unknown --features hydrate --no-default-features -- -D warnings

      - name: cargo test
        run: cargo test
